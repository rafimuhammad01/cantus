repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        language: system
        entry: bash -c 'cd backend && gofmt -l -w .'
        files: ^backend/.*\.go$
        pass_filenames: false
      - id: go-vet
        name: go vet
        language: system
        entry: bash -c 'cd backend && go vet ./...'
        files: ^backend/.*\.go$
        pass_filenames: false
      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: bash -c 'cd backend && golangci-lint run ./...'
        files: ^backend/.*\.go$
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        files: ^audio-processor/.*\.py$
      - id: ruff-format
        files: ^audio-processor/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/.*\.(ts|vue|json|css)$
