services:
  backend:
    image: ghcr.io/rafimuhammad01/cantus-backend:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      YT_DLP_COOKIES_PATH: /secrets/youtube-cookies.txt
    volumes:
      - ./secrets/youtube-cookies.txt:/secrets/youtube-cookies.txt:rw
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
