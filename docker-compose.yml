services:
  bgutil:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    expose:
      - "4416"

  backend:
    image: ghcr.io/rafimuhammad01/cantus-backend:latest
    restart: unless-stopped
    depends_on:
      - bgutil
    env_file:
      - ./backend/.env
    environment:
      # Override: in-cluster DNS for the PoT sidecar.
      YT_DLP_POT_BASE_URL: http://bgutil:4416
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
